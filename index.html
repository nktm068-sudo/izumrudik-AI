<!DOCTYPE html>
<div id="auth-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0d1117; z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
    <h2 style="color:#50c878">Регистрация Emerald ID</h2>
    <input type="text" id="reg-name" placeholder="Как тебя зовут?" style="margin:10px; padding:10px; border-radius:20px; border:1px solid #50c878; background:transparent; color:white;">
    <input type="password" id="reg-pass" placeholder="Придумай пароль" style="margin:10px; padding:10px; border-radius:20px; border:1px solid #50c878; background:transparent; color:white;">
    <button id="reg-btn" style="background:#50c878; color:white; border:none; padding:10px 25px; border-radius:20px; cursor:pointer;">Создать аккаунт</button>
</div>

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изумрудик AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Главный светящийся изумруд -->
    <div id="emerald" title="Нажми и говори"></div>
    
    <h1>Изумрудик</h1>
    <p id="status">Нажми на круг или напиши вопрос</p>

    <!-- Твоя идеальная зелёная таблетка -->
    <div id="input-container">
        <input type="text" id="user-input" placeholder="Спросите о чём угодно..." autocomplete="off">
        <button id="send-btn" title="Отправить">
            <span class="arrow-up">↑</span>
        </button>
    </div>

    <!-- Место для ответа нейросети -->
    <div id="ai-answer"></div>

    <script src="script.js"></script>
</body>
</html>
