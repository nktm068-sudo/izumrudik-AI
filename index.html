<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изумрудик AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ОКНО РЕГИСТРАЦИИ -->
    <div id="auth-screen">
        <h2 style="color:#50c878">Emerald ID: Регистрация</h2>
        <input type="text" id="reg-name" placeholder="Как тебя зовут?" autocomplete="off">
        <input type="password" id="reg-pass" placeholder="Придумай пароль" autocomplete="off">
        <button id="reg-btn">Создать аккаунт</button>
    </div>

    <!-- ТВОЙ ЛИЧНЫЙ ID В УГЛУ -->
    <div id="id-badge">Emerald ID: <span id="user-id-display">...</span></div>

    <div id="emerald" title="Нажми и говори"></div>
    <h1>Изумрудик</h1>
    <p id="status">Нажми на круг или напиши вопрос</p>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Спросите о чём угодно..." autocomplete="off">
        <button id="send-btn"><span class="arrow-up">↑</span></button>
    </div>

    <div id="ai-answer"></div>

    <script src="script.js"></script>
</body>
</html>
